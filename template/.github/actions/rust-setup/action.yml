name: "Rust setup"
description: "Installs a Rust toolchain with specified components, targets, and tools, and configures caching."

inputs:
  toolchain:
    description: "Rust toolchain to install: stable, nightly, or an explicit version."
    required: false
    default: stable
  components:
    description: "Comma-separated rustup components (e.g. rust-src, miri). Empty installs rustfmt and clippy."
    required: false
    default: "rustfmt, clippy"
  targets:
    description: "Comma-separated cross-compilation targets (e.g. thumbv7em-none-eabihf). Empty installs none."
    required: false
    default: ""
  tools:
    description: "Comma-separated cargo tools to install via taiki-e/install-action (e.g. nextest, cargo-deny). Empty installs none."
    required: false
    default: ""
  workspaces:
    description: "Passed to Swatinem/rust-cache; set when the Cargo workspace isn't at the repo root (e.g. fuzz)."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        target: ${{ inputs.targets }}
        cache-all-crates: true
        cache-workspaces: ${{ inputs.workspaces }}

    - name: Install cargo tools
      if: inputs.tools != ''
      uses: taiki-e/install-action@f48d2f8ba2b452934c948b7be1a768079c3632ff # v2
      with:
        tool: ${{ inputs.tools }}

    # generate lockfile if not committed yet
    - name: Ensure Cargo.lock
      shell: bash
      run: test -f Cargo.lock || cargo generate-lockfile

    - name: Set env
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> $GITHUB_ENV
