name: Benchmarks

# Compile-check only: plain `cargo bench` numbers aren't tracked across runs,
# and shared GitHub runners have variable CPU/thermal behavior, so timing
# gates flag false regressions there.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup

      - name: Benchmarks (compile)
        run: cargo bench --no-run --locked
