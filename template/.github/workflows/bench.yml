name: Benchmarks

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup

      # Compile-check only: plain `cargo bench` numbers aren't tracked across runs,
      # and shared GitHub runners have variable CPU/thermal behavior, so timing
      # gates flag false regressions there. Enable `bench_gating` at generation
      # time for a CodSpeed-based perf-regression workflow instead.
      - name: Benchmarks (compile)
        run: cargo bench --no-run --locked
