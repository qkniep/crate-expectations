name: feature-powerset

# Type-checks every combination of Cargo features with cargo-hack, catching items
# that lack a `#[cfg(feature = "...")]` gate or only build under the --all-features
# set the core suite uses. Mirrors `just hack`. Only earns its CI minutes once
# Cargo.toml has two or more optional features — with none, the powerset is a
# single combination already covered by the core suite (and no-std.yml).
# See: https://github.com/taiki-e/cargo-hack

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: feature-powerset-${{ github.ref }}
  cancel-in-progress: true

jobs:
  powerset:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup
        with:
          # Type-checking only; rustfmt/clippy aren't needed here.
          components: ""
          tools: cargo-hack

      # Identical to `just hack`: every feature combination must type-check across
      # all targets (lib, bins, tests, benches).
      - name: Check feature powerset
        run: cargo hack --feature-powerset --locked check --all-targets
