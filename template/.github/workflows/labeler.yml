name: Labeler

# Syncs the repo's labels to .github/labels.yml so the label set is declarative
# and version-controlled. Runs when that file changes (and on demand).

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths: [".github/labels.yml"]
  workflow_dispatch:

jobs:
  labeler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write # create/update/delete labels
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6
        with:
          yaml-file: .github/labels.yml
          # Previews changes without applying. Flip to false once you're happy
          # with the set above, or to let it prune labels not listed here.
          dry-run: true
