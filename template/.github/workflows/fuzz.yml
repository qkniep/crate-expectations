name: Fuzz

# Longer fuzzing run on a weekly schedule.
# Switch the cron to daily, or bump -max_total_time below, to fuzz more aggressively.

permissions:
  contents: read

on:
  schedule:
    # Mondays at 06:00 UTC. Note: scheduled runs only fire on the default branch.
    - cron: "0 6 * * 1"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    # Headroom over -max_total_time=1800 (30m) for checkout, nightly + cargo-fuzz
    # install, and building the target. Bump both together if you raise the budget.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install nightly
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "fuzz"

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@6c1f7cf125e42770ff087ea443901b487cc5471a # v2
        with:
          tool: cargo-fuzz

      - name: Fuzz
        run: cargo +nightly fuzz run fuzz_target_1 -- -max_total_time=1800 -timeout=10
