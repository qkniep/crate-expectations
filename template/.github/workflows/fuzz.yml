name: Fuzz

# Longer fuzzing run on a weekly schedule. A per-PR 60s smoke is a weak signal and
# pays the nightly + cargo-fuzz install every time; a longer scheduled run finds
# more and still catches fuzz-harness build breakage. Switch the cron to daily, or
# bump -max_total_time below, to fuzz more aggressively.

permissions:
  contents: read

on:
  schedule:
    # Mondays at 06:00 UTC. Note: scheduled runs only fire on the default branch.
    - cron: "0 6 * * 1"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    # Headroom over -max_total_time=1800 (30m) for checkout, nightly + cargo-fuzz
    # install, and building the target. Bump both together if you raise the budget.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          # The fuzz harness is its own crate under fuzz/, not the repo-root workspace.
          components: ""
          tools: cargo-fuzz
          workspaces: "fuzz"

      - name: Fuzz
        run: cargo +nightly fuzz run fuzz_target_1 -- -max_total_time=1800 -timeout=10
