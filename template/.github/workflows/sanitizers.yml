name: Sanitizers

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: sanitizers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, leak, thread]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # Sanitizers need to recompile std with instrumentation (-Zbuild-std), which
      # requires the rust-src component on a nightly toolchain.
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          components: rust-src

      - name: Test under ${{ matrix.sanitizer }} sanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=${{ matrix.sanitizer }}"
          RUSTDOCFLAGS: "-Zsanitizer=${{ matrix.sanitizer }}"
        run: cargo +nightly test -Zbuild-std --all-features --target x86_64-unknown-linux-gnu
