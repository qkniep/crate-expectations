name: no_std

# Checks that the crate builds without `std` on a bare-metal target.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: no-std-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-std:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/rust-setup
        with:
          # Build-only check on a bare-metal target; rustfmt/clippy aren't needed.
          components: ""
          targets: thumbv7em-none-eabihf

      - name: Build without std
        run: cargo build --no-default-features --target thumbv7em-none-eabihf --locked
