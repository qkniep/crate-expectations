name: Miri

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: miri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  miri:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Strict pointer-provenance checking catches a broader class of UB.
      MIRIFLAGS: "-Zmiri-strict-provenance"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install nightly + Miri
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: miri

      # nextest to match `just miri` (and the rest of the template's test runner).
      - name: Install nextest
        uses: taiki-e/install-action@6c1f7cf125e42770ff087ea443901b487cc5471a # v2
        with:
          tool: cargo-nextest

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Miri test
        run: cargo +nightly miri nextest run --all-features
