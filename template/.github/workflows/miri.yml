name: Miri

# Miri detects unsafe code that fails to uphold its safety requirements.
# See: https://github.com/rust-lang/miri

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: miri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  miri:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Strict pointer-provenance checking catches a broader class of UB.
      MIRIFLAGS: "-Zmiri-strict-provenance"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          components: miri
          tools: cargo-nextest

      - name: Miri test
        run: cargo +nightly miri nextest run --all-features
