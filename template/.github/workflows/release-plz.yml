# Automates releases with release-plz (https://release-plz.dev):
#   * "release-plz-pr" opens/updates a release PR that bumps the version and
#     updates CHANGELOG.md from the Conventional Commit titles of your
#     squash-merged PRs (enforced by pr-title.yml).
#   * "release-plz-release" publishes to crates.io and tags the release ONLY when
#     that PR is merged. release-plz.toml sets `release_always = false`, so a plain
#     push to main never publishes — merging the release PR is your deliberate
#     "publish now" signal, and the first version (0.1.0) is gated like any other.
#
# This workflow runs release-plz with the built-in GITHUB_TOKEN — no GitHub App
# or PAT needed. Repo setup:
#   * Leave Settings > Actions > General > Workflow permissions read-only; the
#     permissions: block below grants this workflow the writes it needs.
#   * Tick "Allow GitHub Actions to create and approve pull requests" — a policy
#     gate the permissions: block can't grant on its own.
#   * Add a CARGO_REGISTRY_TOKEN secret (a crates.io API token).
#
# Caveat: a release PR opened by GITHUB_TOKEN doesn't trigger CI (GitHub blocks
# token-created events from starting workflow runs). Harmless for a library
# release — the PR only bumps the version and changelog. If you want CI to run on
# the release PR, or you add a tag-triggered release workflow (which GITHUB_TOKEN
# can't fire), switch to a PAT or GitHub App token:
# https://release-plz.dev/docs/github/token
name: Release-plz

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: Run release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: Run release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
