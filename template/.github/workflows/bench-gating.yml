name: Benchmarks (CodSpeed)

# CodSpeed runs the criterion benches under instrumentation (deterministic,
# CPU-model-independent), so it can gate on perf deltas reliably even on
# shared runners — unlike wall-clock timing. Needs a CODSPEED_TOKEN secret.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: bench-gating-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codspeed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup
        with:
          # Benchmark build only; rustfmt/clippy aren't needed here.
          components: ""
          tools: cargo-codspeed

      - name: Build benchmarks
        run: cargo codspeed build

      - name: Run benchmarks
        uses: CodSpeedHQ/action@76578c2a7ddd928664caa737f0e962e3085d4e7c # v3
        with:
          run: cargo codspeed run
          token: ${{ secrets.CODSPEED_TOKEN }}
