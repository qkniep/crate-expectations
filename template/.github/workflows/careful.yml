name: cargo-careful

# Runs the test suite against a std rebuilt with extra debug assertions to catch UB.
# See: https://github.com/RalfJung/cargo-careful
#
# Scheduled weekly: has little value under default `unsafe_code = "forbid"`.
# Run it from the Actions tab when touching unsafe code.
#
# NOTE: keep the job below in sync with careful-pr.yml — the two files differ
# only in their `on:` triggers, and pre-script.rhai installs exactly one.

permissions:
  contents: read

on:
  schedule:
    # Mondays at 06:00 UTC. Note: scheduled runs only fire on the default branch.
    - cron: "0 6 * * 1"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

concurrency:
  group: careful-${{ github.ref }}
  cancel-in-progress: true

jobs:
  careful:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # cargo-careful runs tests against a std rebuilt with extra debug assertions,
      # so it needs nightly + rust-src.
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          components: rust-src
          tools: cargo-careful

      - name: Test with cargo-careful
        run: cargo +nightly careful test --all-features
