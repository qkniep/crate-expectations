name: cargo-careful

# Runs the test suite against a std rebuilt with extra debug assertions to catch UB.
# Scheduled weekly: has no value under default `unsafe_code = "forbid"`.
# Run it from the Actions tab when touching unsafe code.

permissions:
  contents: read

on:
  schedule:
    # Mondays at 06:00 UTC. Note: scheduled runs only fire on the default branch.
    - cron: "0 6 * * 1"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

concurrency:
  group: careful-${{ github.ref }}
  cancel-in-progress: true

jobs:
  careful:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # cargo-careful runs tests against a std rebuilt with extra debug assertions,
      # so it needs nightly + rust-src.
      - name: Install nightly + rust-src
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-careful
        uses: taiki-e/install-action@6c1f7cf125e42770ff087ea443901b487cc5471a # v2
        with:
          tool: cargo-careful

      - name: Test with cargo-careful
        run: cargo +nightly careful test --all-features
