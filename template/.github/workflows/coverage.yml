name: Coverage

# Performs test coverage analysis, uploads results to Codecov.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup
        with:
          tools: nextest

      - name: Install llvm-cov
        uses: taiki-e/install-action@6c1f7cf125e42770ff087ea443901b487cc5471a # v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --lcov --output-path lcov.info nextest

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: lcov.info
          # Keep false: `true` fails CI on fork PRs that can't read the repo
          # secret. Flip to true once coverage runs only on trusted events.
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
