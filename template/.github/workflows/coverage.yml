name: Coverage

# Performs test coverage analysis, uploads results to Codecov.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/rust-setup
        with:
          tools: nextest,cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --lcov --output-path lcov.info nextest

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          # Keep false: `true` fails CI on fork PRs that can't read the repo
          # secret. Flip to true once coverage runs only on trusted events.
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
