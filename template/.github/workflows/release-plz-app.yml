# Automates releases with release-plz (https://release-plz.dev):
#   * "release-plz-pr" opens/updates a release PR that bumps the version and
#     updates CHANGELOG.md from the Conventional Commit titles of your
#     squash-merged PRs (enforced by pr-title.yml).
#   * "release-plz-release" publishes to crates.io and tags the release ONLY when
#     that PR is merged. release-plz.toml sets `release_always = false`, so a plain
#     push to main never publishes — merging the release PR is your deliberate
#     "publish now" signal, and the first version (0.1.0) is gated like any other.
#
# This workflow uses a GitHub App token instead of the built-in GITHUB_TOKEN,
# whose events can't trigger other workflows. That matters in two cases, and the
# App token covers both with no repo settings flipped:
#   * a published binary's release tag must fire release-dist.yml to build the
#     cross-platform artifacts — GITHUB_TOKEN would leave that workflow unrun;
#   * CI must run on the release PR so branch protection's required status checks
#     can gate it — a GITHUB_TOKEN-opened PR gets no checks and can't be merged.
#
# Setup:
#   1. Create a GitHub App (Settings > Developer settings > GitHub Apps) with
#      repository permissions Contents and Pull requests both Read & write.
#      Install it on this repo and generate a private key.
#   2. Add repository secrets APP_ID, APP_PRIVATE_KEY (the private key contents),
#      and CARGO_REGISTRY_TOKEN (a crates.io API token).
# See https://release-plz.dev/docs/github/token for token options.
#
# GATED TO PUBLIC REPOS: both jobs carry `if: !github.event.repository.private`.
# On a private repo release-plz can't authenticate the git operations it runs in
# its own temporary clones (`git fetch origin main` hits an interactive credential
# prompt and fails), so it churns the release PR — closing it and opening a new one
# on every push to main. You also don't publish to crates.io while private. So the
# jobs stay inert until you make the repo public, then resume automatically. (To
# run release-plz while private instead, drop the `if` guards and inject the token
# as a GLOBAL git credential so its temp clones can auth.)
name: Release-plz

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.private }} # public repos only — see header
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          cache: false
      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.private }} # public repos only — see header
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          cache: false
      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
