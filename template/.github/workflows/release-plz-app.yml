# Automates releases with release-plz (https://release-plz.dev):
#   * "release-plz-pr" opens/updates a release PR that bumps the version and
#     updates CHANGELOG.md from the Conventional Commit titles of your
#     squash-merged PRs (enforced by pr-title.yml).
#   * "release-plz-release" publishes to crates.io and tags the release ONLY when
#     that PR is merged. release-plz.toml sets `release_always = false`, so a plain
#     push to main never publishes — merging the release PR is your deliberate
#     "publish now" signal, and the first version (0.1.0) is gated like any other.
#
# This workflow uses a GitHub App token instead of the built-in GITHUB_TOKEN,
# which can't trigger other workflows: a release tag created with it would never
# fire release-dist.yml, so no cross-platform binaries would be built. The App
# token fires that workflow, also runs CI on the release PR, and needs no repo
# settings flipped.
#
# Setup:
#   1. Create a GitHub App (Settings > Developer settings > GitHub Apps) with
#      repository permissions Contents and Pull requests both Read & write.
#      Install it on this repo and generate a private key.
#   2. Add repository secrets APP_ID, APP_PRIVATE_KEY (the private key contents),
#      and CARGO_REGISTRY_TOKEN (a crates.io API token).
# See https://release-plz.dev/docs/github/token for token options.
name: Release-plz

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          cache: false
      - name: Run release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          cache: false
      - name: Run release-plz
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
