name: Scorecard

# OSSF Scorecard assesses supply-chain security posture (branch protection, pinned
# actions, token permissions, ...) and publishes results to the Scorecard API so
# you can show a badge. Scheduled runs only fire on the default branch.
on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: ["main"]

# Read-only by default; the analysis job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # checkout (overrides workflow-level permissions, so repeat here)
      security-events: write # Needed to upload results to the code-scanning dashboard.
      id-token: write # Needed for the publish_results provenance attestation.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: results.sarif
