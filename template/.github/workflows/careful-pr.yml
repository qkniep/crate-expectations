name: cargo-careful

# Runs the test suite against a std rebuilt with extra debug assertions to catch UB.
# See: https://github.com/RalfJung/cargo-careful
#
# Per-PR cadence: the default under `unsafe_code = "deny"`, where unsafe can be
# introduced in any PR, so careful gates every PR before merge.
#
# NOTE: keep the job below in sync with careful.yml — the two files differ only
# in their `on:` triggers, and pre-script.rhai installs exactly one.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: careful-${{ github.ref }}
  cancel-in-progress: true

jobs:
  careful:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # cargo-careful runs tests against a std rebuilt with extra debug assertions,
      # so it needs nightly + rust-src.
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
          components: rust-src
          tools: cargo-careful

      - name: Test with cargo-careful
        run: cargo +nightly careful test --all-features
