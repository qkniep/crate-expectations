name: Release

# Builds cross-platform binaries on a version tag and attaches them to the GitHub
# release. The crate name is read from Cargo.toml at runtime, so this file needs
# no per-project edits. Pair it with release-plz (which creates the tag/release)
# or push tags yourself: `git tag v0.1.0 && git push --tags`.

permissions:
  contents: write # create the release and upload assets

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-dist-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read crate name from Cargo.toml
        id: meta
        shell: bash
        run: echo "bin=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> "$GITHUB_OUTPUT"

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: ${{ steps.meta.outputs.bin }}
          target: ${{ matrix.target }}
          archive: $bin-$target
          token: ${{ secrets.GITHUB_TOKEN }}
