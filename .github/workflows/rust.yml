name: Rust

# Least privilege: every job here only reads the repo. Scope up per-job if one
# ever needs to write (e.g. commit, comment, or push).
permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Tests
        run: cargo nextest run --all-targets --all-features --locked

      # nextest doesn't run doctests, so run them separately to match `just check`.
      - name: Doctests
        run: cargo test --doc --all-features --locked

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [debug, release]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Build (${{ matrix.mode }})
        run: cargo build --all-targets ${{ matrix.mode == 'release' && '--release' || '' }} --locked

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Cargo deny (advisories, licenses, bans, sources)
        run: cargo deny check

      - name: Unused deps
        run: cargo machete

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features --document-private-items --locked

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Install llvm-cov
        uses: taiki-e/install-action@v2.79.0
        with:
          tool: cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --lcov --output-path lcov.info nextest

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          # Keep false: `true` fails CI on fork PRs that can't read the repo
          # secret. Flip to true once coverage runs only on trusted events.
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      # Compile-check only: plain `cargo bench` results aren't tracked across
      # runs, so running them in CI just burns minutes. Swap in a perf-regression
      # action (e.g. bencherdev/bencher) if you want to gate on benchmark deltas
      # — but run it on a dedicated/self-hosted runner. Shared GitHub runners have
      # variable CPU, neighbor contention, and thermal throttling, so timing-based
      # gates flag false regressions there.
      - name: Benchmarks (compile)
        run: cargo bench --no-run --locked

  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Pin to the `rust-version` declared in Cargo.toml so the MSRV can't drift
      # upward unnoticed. The explicit `+1.90.0` keeps this check on the MSRV
      # toolchain regardless of any other installed/default toolchain.
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.90.0

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo +1.90.0 check --all-features --locked

  semver:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # No-op until the first version is published to crates.io; afterwards it
      # fails the build on accidental SemVer-incompatible public API changes.
      - name: Check SemVer
        uses: obi1kenobi/cargo-semver-checks-action@v2

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Check spelling
        uses: crate-ci/typos@v1
