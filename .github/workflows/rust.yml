name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Tests
        run: cargo nextest run --workspace --all-targets --all-features --locked --exclude=riptide-fuzz

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [debug, release]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Build (${{ matrix.mode }})
        run: cargo build --workspace --all-targets ${{ matrix.mode == 'release' && '--release' || '' }} --locked

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Cargo audit
        run: cargo audit

      - name: License check
        run: cargo license

      - name: Unused deps
        run: cargo machete

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --locked

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      - name: Install llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info nextest

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz bencode
        run: cargo +nightly fuzz run --fuzz-dir=riptide/fuzz decode_bencode -- -max_total_time=60

      - name: Fuzz P2P
        run: cargo +nightly fuzz run --fuzz-dir=riptide/fuzz decode_p2p_message -- -max_total_time=60

      - name: Fuzz extension
        run: cargo +nightly fuzz run --fuzz-dir=riptide/fuzz decode_extension_message -- -max_total_time=60
