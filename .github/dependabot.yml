version: 2
# Keeps the actions used by this template's own self-test workflow up to date.
# Generated projects ship their own dependabot config (template/.github/dependabot.yml).
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
